<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Music App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">✦ Music</div>
            <nav>
                <div class="nav-item active" onclick="search('Top Hits')"><i class="fa-solid fa-house"></i> Home</div>
                <div class="nav-item" id="btn-mais"><i class="fa-solid fa-bolt"></i> Mais Ouvidas</div>
                <div class="nav-item" id="btn-hist"><i class="fa-solid fa-clock"></i> Histórico</div>
                <p class="label">Playlists <span onclick="criarPL()">+</span></p>
                <div id="lista-pl"></div>
            </nav>
        </aside>

        <main class="main-content">
            <input type="text" id="busca" placeholder="Pesquisar...">
            <h2 id="titulo">Sugestões</h2>
            <div class="grid" id="grid"></div>
            <div class="player" id="player"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
